name: Build APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'website/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug and release APK
        id: build
        run: |
          set -o pipefail
          ./gradlew assembleDebug assembleRelease --no-daemon --stacktrace 2>&1 | tee build_log.txt

      - name: Extract errors on failure
        if: failure()
        run: python3 .github/extract_errors.py

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error
          path: error.txt

      - name: Rename APKs
        if: success()
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/*.apk dist/NX-Launcher-debug.apk
          cp app/build/outputs/apk/release/*.apk dist/NX-Launcher-release-unsigned.apk

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nx-launcher-debug
          path: dist/NX-Launcher-debug.apk

      - name: Upload release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nx-launcher-release
          path: dist/NX-Launcher-release-unsigned.apk

      - name: Publish latest release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Automatic build from the latest commit on main.
            Install NX-Launcher-debug.apk on your device (the release APK is unsigned).
          prerelease: true
          files: |
            dist/NX-Launcher-debug.apk
            dist/NX-Launcher-release-unsigned.apk
