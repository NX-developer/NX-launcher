name: Build APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'website/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug and release APK
        id: build
        run: |
          set -o pipefail
          ./gradlew assembleDebug assembleRelease --no-daemon --stacktrace 2>&1 | tee build_log.txt

      - name: Extract errors on failure
        if: failure()
        run: python3 .github/extract_errors.py

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error
          path: error.txt

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nx-launcher-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nx-launcher-release
          path: app/build/outputs/apk/release/*.apk
