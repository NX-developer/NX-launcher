name: Build Engine APK

on:
  push:
    branches: [ engine ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install NDK and CMake
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk;25.2.9519653" "cmake;3.22.1" > /dev/null 2>&1 || true

      - name: Get LTW
        run: |
          mkdir -p app_pojavlauncher/libs
          cd app_pojavlauncher/libs
          wget -q https://github.com/PojavLauncherTeam/LTW/releases/latest/download/ltw-release.aar

      - name: Get JRE 8
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GH_PAT }}
          workflow: build.yml
          path: app_pojavlauncher/src/main/assets/components/jre
          workflow_conclusion: success
          repo: AngelAuraMC/angelauramc-openjdk-build
          branch: buildjre8
          name: jre8-pojav

      - name: Get JRE 17
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GH_PAT }}
          workflow: build.yml
          path: app_pojavlauncher/src/main/assets/components/jre-new
          workflow_conclusion: success
          repo: AngelAuraMC/angelauramc-openjdk-build
          branch: eva/buildjre-17-21-25
          name: jre17-pojav

      - name: Get JRE 21
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GH_PAT }}
          workflow: build.yml
          path: app_pojavlauncher/src/main/assets/components/jre-21
          workflow_conclusion: success
          repo: AngelAuraMC/angelauramc-openjdk-build
          branch: eva/buildjre-17-21-25
          name: jre21-pojav

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build JRE JAR files
        id: jrejar
        run: |
          set -o pipefail
          ./scripts/languagelist_updater.sh
          ./gradlew :jre_lwjgl3glfw:build --no-daemon --stacktrace 2>&1 | tee -a build_log.txt

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build debug APK
        id: build
        run: |
          set -o pipefail
          ./gradlew :app_pojavlauncher:assembleDebug --no-daemon --stacktrace 2>&1 | tee -a build_log.txt

      - name: Extract errors on failure
        if: failure()
        run: python3 .github/extract_errors.py

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error
          path: error.txt

      - name: Rename APK
        if: success()
        run: |
          mkdir -p dist
          cp app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk dist/NX-Launcher-engine-debug.apk

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nx-launcher-engine-debug
          path: dist/NX-Launcher-engine-debug.apk

      - name: Publish engine release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: engine-latest
          name: Engine build (PojavLauncher core)
          body: |
            NX Launcher engine build based on the PojavLauncher open source core.
            Install NX-Launcher-engine-debug.apk. Runs Minecraft up to about 1.21 (Java 8/17/21).
          prerelease: true
          files: dist/NX-Launcher-engine-debug.apk
