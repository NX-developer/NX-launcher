name: Build FCL APK

on:
  push:
    branches: [ fcl ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install NDK and CMake
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk;27.0.12077973" "cmake;3.22.1" > /dev/null 2>&1 || true

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build debug APK
        id: build
        run: |
          set -o pipefail
          ./gradlew :FCL:assembleDebug -Darch=all --no-daemon --stacktrace 2>&1 | tee build_log.txt

      - name: Extract errors on failure
        if: failure()
        run: python3 .github/extract_errors.py

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error
          path: error.txt

      - name: Collect APK
        if: success()
        run: |
          mkdir -p dist
          cp FCL/build/outputs/apk/debug/*.apk dist/ 2>/dev/null || true
          ls -la dist

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nx-launcher-fcl-debug
          path: dist/*.apk

      - name: Publish FCL release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: fcl-latest
          name: FCL base build (experimental)
          body: |
            NX Launcher experimental build based on the FoldCraftLauncher open source core.
            This stage still shows FCL's own UI; the NX Compose UI graft comes next.
          prerelease: true
          files: dist/*.apk
